<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../static/css/forgot_password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="page-bg"></div>

    <main class="forgot-container">
        <form class="forgot-box">
            <div class="brand">Beyond the City</div>
            <h1>Forgot Password</h1>
            <p class="subtitle">Enter your email and we’ll send you a reset link</p>

            <div class="input-box">
                <input type="email" placeholder="Email Address" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <button type="submit" class="btn">Send Reset Link</button>

            <div class="bottom-text">
                <p>Remember your password? <a href="sign-in.html">Login</a></p>
            </div>
        </form>
    </main>

    <script src="../static/JS/forgot_password.js"></script>
</body>
</html>
