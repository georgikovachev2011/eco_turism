<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="stylesheet" href="../static/css/sign-up-in.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="page-bg"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="brand">Beyond the City</div>
      <h1>Login</h1>

      <form id="signinForm" class="auth-form">
        <div class="input-box">
          <input type="text" id="signinUsername" placeholder="Username" required />
          <i class="fa-solid fa-user"></i>
        </div>

        <div class="input-box">
          <input type="password" id="signinPassword" placeholder="Password" required />
          <i class="fa-solid fa-lock"></i>
        </div>

        <div class="options-row">
          <label class="remember">
            <input type="checkbox" />
            Remember me
          </label>
          <a href="forgot_password.html" class="link">Forgot Password?</a>
        </div>

        <button type="submit" class="auth-btn">Login</button>

        <p class="switch-text">
          Don’t have an account?
          <a href="sign-up.html" class="link">Register</a>
        </p>

        <p id="signinMessage" class="message"></p>
      </form>
    </div>
  </main>

  <script src="../static/JS/sign-in-up.js"></script>
</body>
</html>
