<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="../static/css/forgot_password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="page-bg"></div>

    <main class="forgot-container">
        <form class="forgot-box" id="resetForm">
            <div class="brand">Beyond the City</div>
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your new password below</p>

            <div class="input-box">
                <input type="password" id="newPassword" placeholder="New Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <button type="submit" class="btn">Reset Password</button>

            <div class="bottom-text">
                <p>Back to <a href="sign-in.html">Login</a></p>
            </div>
        </form>
    </main>

    <script src="../static/JS/reset-password.js"></script>
</body>
</html>
